<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RustDesk Address Book | TechBugs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --bg: #09090b; /* Very deep zinc */
      --surface: rgba(24, 24, 27, 0.65); /* Translucent dark glass */
      --surface-hover: rgba(39, 39, 42, 0.8);
      --border: rgba(255, 255, 255, 0.1); 
      --border-focus: rgba(255, 255, 255, 0.3);
      --primary-bg: #ffffff; /* Stark white for dark mode buttons */
      --primary-text: #000000;
      --primary-hover: #e4e4e7;
      --danger: #ef4444;
      --text: #f4f4f5; 
      --text-muted: #a1a1aa; 
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.5);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;
    }

    body.light-mode {
      --bg: #f4f5f7; /* TickTick's soothing off-white/gray */
      --surface: rgba(255, 255, 255, 0.85); /* Frosty but glare-free */
      --surface-hover: rgba(255, 255, 255, 1);
      --border: rgba(0, 0, 0, 0.06); 
      --border-focus: rgba(0, 0, 0, 0.2);
      --primary-bg: #2a2a2a; /* Softer black to reduce contrast strain */
      --primary-text: #ffffff;
      --primary-hover: #000000;
      --text: #242424; /* TickTick's dark gray text instead of pure black */
      --text-muted: #737373; 
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s, color 0.3s;
      background-image: 
        radial-gradient(at 0% 0%, rgba(128, 128, 128, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(128, 128, 128, 0.05) 0px, transparent 50%);
      background-attachment: fixed;
    }

    .glass-panel {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }

    button, input { font: inherit; outline: none; }

    input {
      width: 100%;
      background: rgba(128, 128, 128, 0.08);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      transition: all 0.2s;
    }

    input::placeholder { color: var(--text-muted); opacity: 0.8; }
    input:focus { border-color: var(--text); box-shadow: 0 0 0 1px var(--text); }

    button {
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:active { transform: scale(0.98); }

    .btn-main {
      background: var(--primary-bg);
      color: var(--primary-text);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
    }

    .btn-main:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
    }

    .btn-secondary:hover { background: rgba(128, 128, 128, 0.1); border-color: var(--border-focus); }

    .btn-icon-only {
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
    }
    .btn-icon-only:hover { color: var(--text); background: rgba(128, 128, 128, 0.1); border-color: var(--border-focus); }
    .btn-icon-only svg { width: 16px; height: 16px; }

    /* --- Login Overlay --- */
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .login-theme-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
    }

    .login-card {
      padding: 48px 40px;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .login-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }

    .login-header h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; color: var(--text); }
    .login-header p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    .auth-stack { display: flex; flex-direction: column; gap: 16px; }
    .auth-row { display: flex; gap: 12px; }
    .auth-row button { flex: 1; }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      margin: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
    .divider::before { margin-right: 12px; }
    .divider::after { margin-left: 12px; }

    .status { min-height: 20px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .status.error { color: var(--danger); }

    /* --- Main App Layout --- */
    .app-shell {
      display: none;
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 24px;
      flex-direction: column;
      gap: 32px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .title-row h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .header-actions { display: flex; align-items: center; gap: 14px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      background: rgba(128, 128, 128, 0.08);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Theme Toggle */
    .theme-toggle {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-toggle:hover { background: rgba(128, 128, 128, 0.1); color: var(--text); border-color: var(--border-focus); }
    .theme-toggle svg { width: 18px; height: 18px; position: absolute; transition: transform 0.3s, opacity 0.3s; }
    .theme-toggle .sun { opacity: 0; transform: rotate(-90deg); }
    body.light-mode .theme-toggle .sun { opacity: 1; transform: rotate(0); }
    body.light-mode .theme-toggle .moon { opacity: 0; transform: rotate(90deg); }

    /* --- Cards & Sections --- */
    .card {
      border-radius: var(--radius-md);
      padding: 28px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .card-title { font-size: 18px; font-weight: 600; color: var(--text); }

    .folder-row { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; align-items: center; }
    .folder-pills { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; }

    .folder-pill {
      background: transparent;
      color: var(--text-muted);
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-weight: 500;
      transition: all 0.2s;
    }
    .folder-pill:hover { color: var(--text); background: rgba(128, 128, 128, 0.05); }
    .folder-pill.active {
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
      border-color: transparent;
    }

    .folder-tools { display: flex; gap: 8px; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
    
    .form-footer { display: flex; justify-content: flex-end; gap: 14px; margin-top: 24px; }

    .search-wrap { position: relative; width: 320px; max-width: 100%; }
    .search-wrap input { padding-left: 40px; border-radius: var(--radius-full); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted); }

    /* --- Table --- */
    .table-container {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin-top: 20px;
      background: rgba(128, 128, 128, 0.02);
    }

    table { width: 100%; border-collapse: collapse; text-align: left; }

    th {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }

    td {
      padding: 16px 20px; font-size: 14px;
      border-bottom: 1px solid rgba(128, 128, 128, 0.08); vertical-align: middle;
    }
    
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(128, 128, 128, 0.05); }
    tbody tr:last-child td { border-bottom: none; }

    .tag {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-full);
      background: rgba(128, 128, 128, 0.08); color: var(--text-muted); font-size: 12px; border: 1px solid var(--border);
    }

    .table-actions { display: flex; gap: 8px; }
    .btn-action {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      background: transparent; border: 1px solid transparent; color: var(--text-muted);
      transition: all 0.2s;
    }
    .btn-action svg { width: 16px; height: 16px; pointer-events: none; }
    .btn-action:hover:not(:disabled) { background: rgba(128, 128, 128, 0.1); border-color: var(--border); color: var(--text); }
    .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

    .footer {
      text-align: center; padding: 32px 0 16px 0; color: var(--text-muted);
      font-size: 13px; margin-top: auto;
    }

    @media (max-width: 768px) {
      .card-header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .search-wrap { width: 100%; }
      .folder-row { flex-direction: column; align-items: stretch; }
      .folder-tools { justify-content: flex-end; }
    }
  </style>
</head>

            <label for="clientName">Client name</label>
            <input type="text" id="clientName" placeholder="Office-PC-Solapur">
          </div>
          <div class="field">
            <label for="clientId">RustDesk ID</label>
            <input type="text" id="clientId" placeholder="123 456 789">
          </div>
          <div class="field">
            <label for="clientPassword">Password</label>
            <input type="text" id="clientPassword" placeholder="Client password">
          </div>
          <div class="field">
            <label for="clientNotes">Notes / Tag</label>

        </div>
        <div class="form-footer">
          <button class="btn-secondary" type="button" id="clearBtn">Clear</button>
          <button class="btn-main" type="submit">Save Client</button>
        </div>
      </form>
    </section>

      storageBucket: 'techbugs-directory.firebasestorage.app',
      messagingSenderId: '693496099094',
      appId: '1:693496099094:web:0257ddf91b70c4fd756037'
    };

    let folders = [];
    let currentFolderIndex = 0;
    let editIndex = null;
    let auth = null;
    let db = null;
    let activeUser = null;
    let unsubscribeSnapshot = null;
    let lastSavedHash = '';
    let applyingRemoteState = false;

    const loginShell = document.getElementById('loginShell');
    const appShell = document.getElementById('appShell');
    const clientsBody = document.getElementById('clientsBody');
    const searchBox = document.getElementById('searchBox');
    const folderPills = document.getElementById('folderPills');
    const folderLabel = document.getElementById('folderLabel');
    const modeTag = document.getElementById('modeTag');
    const loginStatus = document.getElementById('loginStatus');
    const syncStatus = document.getElementById('syncStatus');
    const userEmail = document.getElementById('userEmail');

    const clientName = document.getElementById('clientName');
    const clientId = document.getElementById('clientId');
    const clientPassword = document.getElementById('clientPassword');
    const clientNotes = document.getElementById('clientNotes');
    const authEmail = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');

    // Theme logic
    if (localStorage.getItem(THEME_KEY) === 'light') {
      document.body.classList.add('light-mode');
    }

    const themeToggles = document.querySelectorAll('.theme-toggle');
    themeToggles.forEach(btn => {
      btn.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        localStorage.setItem(THEME_KEY, document.body.classList.contains('light-mode') ? 'light' : 'dark');
      });
    });

    function setLoginStatus(message, tone = '') {
      loginStatus.textContent = message || '';
      loginStatus.className = `status${tone ? ` ${tone}` : ''}`;
    }

    function setSyncStatus(message) {
      syncStatus.textContent = message;
    }

    function cloneDefaultFolders() {
      return DEFAULT_FOLDERS.map((folder) => ({ name: folder.name, clients: [] }));
    }

    function sanitizeFolders(value) {
      if (!Array.isArray(value) || !value.length) return cloneDefaultFolders();
      return value.map((folder) => ({
        name: String(folder?.name || 'Untitled Folder'),
        clients: Array.isArray(folder?.clients)
          ? folder.clients.map((client) => ({
              name: String(client?.name || ''),
              id: String(client?.id || ''),
              password: String(client?.password || ''),
              notes: String(client?.notes || '')
            }))
          : []
      }));
    }

    function readLegacyLocalData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      try {
        return sanitizeFolders(JSON.parse(raw));
      } catch {
        return null;
      }
    }

    function cacheFolders() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(folders));
    }

    function currentFolder() {
      return folders[currentFolderIndex];
    }

    function showLogin() {
      loginShell.style.display = 'flex';
      appShell.style.display = 'none';
    }

    function showApp() {
      loginShell.style.display = 'none';
      appShell.style.display = 'flex';
      clientName.focus();
    }

    function renderFolders() {
      folderPills.innerHTML = '';
      folders.forEach((folder, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `folder-pill${index === currentFolderIndex ? ' active' : ''}`;
        button.textContent = folder.name;
        button.addEventListener('click', () => {
          currentFolderIndex = index;
          resetForm();
          renderFolders();
          renderTable();
        });
        folderPills.appendChild(button);
      });
      folderLabel.textContent = currentFolder()?.name || 'Endpoints';
    }

    function togglePasswordCell(cell, show) {
      const hidden = cell.querySelector('.hidden-pass');
      const real = cell.querySelector('.real-pass');
      hidden.style.display = show ? 'none' : 'inline';
      real.style.display = show ? 'inline' : 'none';
    }

    function renderTable() {
      clientsBody.innerHTML = '';
      const folder = currentFolder();
      if (!folder) return;

      const query = searchBox.value.trim().toLowerCase();
      const filtered = query
        ? folder.clients.filter((client) => client.name.toLowerCase().includes(query) || client.id.toLowerCase().includes(query))
        : folder.clients;

      filtered.forEach((client) => {
        const index = folder.clients.indexOf(client);
        const row = document.createElement('tr');

        const passwordCell = document.createElement('td');
        passwordCell.style.fontFamily = "monospace";
        passwordCell.innerHTML = '<span class="hidden-pass">••••••••</span><span class="real-pass" style="display:none"></span>';
        passwordCell.querySelector('.real-pass').textContent = client.password;

        const actions = document.createElement('td');
        const actionWrap = document.createElement('div');
        actionWrap.className = 'table-actions';

        const connectBtn = document.createElement('button');
        connectBtn.type = 'button';
        connectBtn.className = 'btn-action';
        connectBtn.innerHTML = ICONS.connect;
        connectBtn.title = 'Connect';
        connectBtn.addEventListener('click', () => {
          if (client.id) window.location.href = `rustdesk://${encodeURIComponent(client.id)}`;
        });

        const upBtn = document.createElement('button');
        upBtn.type = 'button';
        upBtn.className = 'btn-action';
        upBtn.innerHTML = ICONS.up;
        upBtn.title = 'Move Up';
        upBtn.disabled = index === 0 || query !== ''; 
        upBtn.addEventListener('click', async () => {
          if (index > 0 && !query) {
            [folder.clients[index], folder.clients[index - 1]] = [folder.clients[index - 1], folder.clients[index]];
            if (editIndex === index) editIndex = index - 1;
            else if (editIndex === index - 1) editIndex = index;
            await persistFolders();
            renderTable();
          }
        });

        const downBtn = document.createElement('button');
        downBtn.type = 'button';
        downBtn.className = 'btn-action';
        downBtn.innerHTML = ICONS.down;
        downBtn.title = 'Move Down';
        downBtn.disabled = index === folder.clients.length - 1 || query !== ''; 
        downBtn.addEventListener('click', async () => {
          if (index < folder.clients.length - 1 && !query) {
            [folder.clients[index], folder.clients[index + 1]] = [folder.clients[index + 1], folder.clients[index]];
            if (editIndex === index) editIndex = index + 1;
            else if (editIndex === index + 1) editIndex = index;
            await persistFolders();
            renderTable();
          }
        });

        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'btn-action';
        editBtn.innerHTML = ICONS.edit;
        editBtn.title = 'Edit';
        editBtn.addEventListener('click', () => loadIntoForm(index));

        const eyeBtn = document.createElement('button');
        eyeBtn.type = 'button';
        eyeBtn.className = 'btn-action';
        eyeBtn.innerHTML = ICONS.eye;
        eyeBtn.title = 'Show password';
        eyeBtn.addEventListener('mousedown', () => togglePasswordCell(passwordCell, true));
        eyeBtn.addEventListener('mouseup', () => togglePasswordCell(passwordCell, false));
        eyeBtn.addEventListener('mouseleave', () => togglePasswordCell(passwordCell, false));

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'btn-action';
        deleteBtn.style.color = 'var(--danger)';
        deleteBtn.innerHTML = ICONS.delete;
        deleteBtn.title = 'Delete';
        deleteBtn.addEventListener('click', async () => {
          if (!confirm(`Delete "${client.name || client.id}" from "${folder.name}"?`)) return;
          folder.clients.splice(index, 1);
          if (editIndex === index) resetForm();
          await persistFolders();
          renderTable();
        });

        actionWrap.append(connectBtn, upBtn, downBtn, editBtn, eyeBtn, deleteBtn);
        actions.appendChild(actionWrap);

        row.innerHTML = `
          <td style="font-weight:500; color:var(--text);">${escapeHtml(client.name)}</td>
          <td style="font-family:monospace;">${escapeHtml(client.id)}</td>
          <td></td>
          <td>${client.notes ? `<span class="tag">${escapeHtml(client.notes)}</span>` : ''}</td>
        `;
        row.children[2].replaceWith(passwordCell);
        row.appendChild(actions);
        clientsBody.appendChild(row);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function resetForm() {
      clientName.value = '';
      clientId.value = '';
      clientPassword.value = '';
      clientNotes.value = '';
      editIndex = null;
      modeTag.textContent = 'New entry';
    }

    function loadIntoForm(index) {
      const client = currentFolder()?.clients[index];
      if (!client) return;
      editIndex = index;
      clientName.value = client.name;
      clientId.value = client.id;
      clientPassword.value = client.password;
      clientNotes.value = client.notes;
      modeTag.textContent = `Editing #${index + 1}`;
      clientName.focus();
    }

    async function persistFolders() {
      cacheFolders();
      if (!activeUser || !db || applyingRemoteState) return;

      const payloadHash = JSON.stringify(folders);
      if (payloadHash === lastSavedHash) return;

      lastSavedHash = payloadHash;
      setSyncStatus('Syncing...');
      await setDoc(doc(db, 'directories', activeUser.uid), {
        folders,
        ownerEmail: activeUser.email || '',
        updatedAt: serverTimestamp()
      }, { merge: true });
      setSyncStatus('Synced');
    }

    async function bootstrapUserData(user) {
      const docRef = doc(db, 'directories', user.uid);
      const snapshot = await getDoc(docRef);
      const remoteFolders = snapshot.exists() ? sanitizeFolders(snapshot.data().folders) : null;
      const legacyFolders = readLegacyLocalData();

      folders = remoteFolders || legacyFolders || cloneDefaultFolders();
      cacheFolders();
      await persistFolders();
    }

    function subscribeToDirectory(user) {
      if (unsubscribeSnapshot) unsubscribeSnapshot();
      unsubscribeSnapshot = onSnapshot(doc(db, 'directories', user.uid), (snapshot) => {
        if (!snapshot.exists()) return;
        const nextFolders = sanitizeFolders(snapshot.data().folders);
        const nextHash = JSON.stringify(nextFolders);
        if (nextHash === JSON.stringify(folders)) {
          lastSavedHash = nextHash;
          setSyncStatus('Synced');
          return;
        }

        applyingRemoteState = true;
        folders = nextFolders;
        lastSavedHash = nextHash;
        if (currentFolderIndex >= folders.length) currentFolderIndex = 0;
        cacheFolders();
        resetForm();
        renderFolders();
        renderTable();
        applyingRemoteState = false;
        setSyncStatus('Synced');
      });
    }

    async function moveFolder(direction) {
      const nextIndex = currentFolderIndex + direction;
      if (nextIndex < 0 || nextIndex >= folders.length) return;
      [folders[currentFolderIndex], folders[nextIndex]] = [folders[nextIndex], folders[currentFolderIndex]];
      currentFolderIndex = nextIndex;
      await persistFolders();
      renderFolders();
      renderTable();
    }

    async function addFolder() {
      const name = prompt('Folder name (e.g. Workplace A):');
      if (!name) return;
      folders.push({ name: name.trim(), clients: [] });
      currentFolderIndex = folders.length - 1;
      await persistFolders();
      renderFolders();
      renderTable();
    }

    async function renameFolder() {
      const folder = currentFolder();
      if (!folder) return;
      const name = prompt('New folder name:', folder.name);
      if (!name) return;
      folder.name = name.trim();
      await persistFolders();
      renderFolders();
      renderTable();
    }

    async function deleteFolder() {
      if (folders.length <= 1) {
        alert('At least one folder is required.');
        return;
      }
      const folder = currentFolder();
      if (!folder) return;
      if (!confirm(`Delete folder "${folder.name}" and all its clients?`)) return;
      folders.splice(currentFolderIndex, 1);
      if (currentFolderIndex >= folders.length) currentFolderIndex = folders.length - 1;
      resetForm();
      await persistFolders();
      renderFolders();
      renderTable();
    }

    async function signInWithGoogle() {
      setLoginStatus('Opening Google sign-in...');
      await signInWithPopup(auth, new GoogleAuthProvider());
    }

    async function signInWithEmail() {
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        setLoginStatus('Enter your email and password first.', 'error');
        return;
      }
      setLoginStatus('Signing you in...');
      await signInWithEmailAndPassword(auth, email, password);
    }

    async function createAccount() {
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        setLoginStatus('Enter an email and password to create the account.', 'error');
        return;
      }
      if (password.length < 6) {
        setLoginStatus('Password must be at least 6 characters.', 'error');
        return;
      }
      setLoginStatus('Creating your account...');
      await createUserWithEmailAndPassword(auth, email, password);
    }

    async function logout() {
      if (auth) await signOut(auth);
    }

    async function initializeFirebase() {
      folders = readLegacyLocalData() || cloneDefaultFolders();
      renderFolders();
      renderTable();
      showLogin();

      const app = initializeApp(embeddedFirebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      await setPersistence(auth, browserLocalPersistence);

      onAuthStateChanged(auth, async (user) => {
        activeUser = user;

        if (!user) {
          if (unsubscribeSnapshot) {
            unsubscribeSnapshot();
            unsubscribeSnapshot = null;
          }
          userEmail.textContent = 'Not signed in';
          setSyncStatus('Waiting');
          showLogin();
          return;
        }

        userEmail.textContent = user.email || 'Google account';
        setSyncStatus('Loading...');
        await bootstrapUserData(user);
        subscribeToDirectory(user);
        renderFolders();
        renderTable();
        setSyncStatus('Synced');
        setLoginStatus('', 'success');
        showApp();
      });
    }

    document.getElementById('clientForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const folder = currentFolder();
      if (!folder) {
        alert('Create a folder first.');
        return;
      }

      const name = clientName.value.trim();
      const id = clientId.value.trim();
      const password = clientPassword.value.trim();
      const notes = clientNotes.value.trim();

      if (!name || !id) {
        alert('Client name and ID are required.');
        return;
      }

      const payload = { name, id, password, notes };
      if (editIndex === null) {
        folder.clients.push(payload);
      } else {
        folder.clients[editIndex] = payload;
      }

      await persistFolders();
      resetForm();
      renderTable();
      clientName.focus();
    });

    searchBox.addEventListener('input', renderTable);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('clearBtn').addEventListener('click', resetForm);
    document.getElementById('moveLeftBtn').addEventListener('click', () => moveFolder(-1));
    document.getElementById('moveRightBtn').addEventListener('click', () => moveFolder(1));
    document.getElementById('addFolderBtn').addEventListener('click', addFolder);
    document.getElementById('renameFolderBtn').addEventListener('click', renameFolder);
    document.getElementById('deleteFolderBtn').addEventListener('click', deleteFolder);
    
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
      try { await signInWithGoogle(); } catch (error) { setLoginStatus(error.message, 'error'); }
    });
    document.getElementById('emailLoginBtn').addEventListener('click', async () => {
      try { await signInWithEmail(); } catch (error) { setLoginStatus(error.message, 'error'); }
    });
    document.getElementById('emailSignupBtn').addEventListener('click', async () => {
      try { await createAccount(); } catch (error) { setLoginStatus(error.message, 'error'); }
    });
    authPassword.addEventListener('keydown', async (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        try { await signInWithEmail(); } catch (error) { setLoginStatus(error.message, 'error'); }
      }
    });

    initializeFirebase();
  </script>
</body>
</html>
