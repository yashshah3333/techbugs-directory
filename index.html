<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RustDesk Address Book | TechBugs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --bg: #09090b; 
      --surface: rgba(24, 24, 27, 0.65); 
      --surface-hover: rgba(39, 39, 42, 0.8);
      --border: rgba(255, 255, 255, 0.1); 
      --border-focus: rgba(255, 255, 255, 0.3);
      --primary-bg: #ffffff; 
      --primary-text: #000000;
      --primary-hover: #e4e4e7;
      --danger: #ef4444;
      --text: #f4f4f5; 
      --text-muted: #a1a1aa; 
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.5);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;
    }

    body.light-mode {
      --bg: #f4f5f7; /* TickTick's soothing off-white/gray */
      --surface: rgba(255, 255, 255, 0.85); /* Frosty but glare-free */
      --surface-hover: rgba(255, 255, 255, 1);
      --border: rgba(0, 0, 0, 0.06); 
      --border-focus: rgba(0, 0, 0, 0.2);
      --primary-bg: #2a2a2a; /* Softer black to reduce contrast strain */
      --primary-text: #ffffff;
      --primary-hover: #000000;
      --text: #242424; /* TickTick's dark gray text instead of pure black */
      --text-muted: #737373; 
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s, color 0.3s;
      background-image: 
        radial-gradient(at 0% 0%, rgba(128, 128, 128, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(128, 128, 128, 0.05) 0px, transparent 50%);
      background-attachment: fixed;
    }

    .glass-panel {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }

    button, input { font: inherit; outline: none; }

    input {
      width: 100%;
      background: rgba(128, 128, 128, 0.08);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      transition: all 0.2s;
    }

    input::placeholder { color: var(--text-muted); opacity: 0.8; }
    input:focus { border-color: var(--text); box-shadow: 0 0 0 1px var(--text); }

    button {
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:active { transform: scale(0.98); }

    .btn-main {
      background: var(--primary-bg);
      color: var(--primary-text);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
    }

    .btn-main:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
    }

    .btn-secondary:hover { background: rgba(128, 128, 128, 0.1); border-color: var(--border-focus); }

    .btn-icon-only {
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
    }
    .btn-icon-only:hover { color: var(--text); background: rgba(128, 128, 128, 0.1); border-color: var(--border-focus); }
    .btn-icon-only svg { width: 16px; height: 16px; }

    /* --- Login Overlay --- */
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .login-theme-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
    }

    .login-card {
      padding: 48px 40px;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .login-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }

    .login-header h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; color: var(--text); }
    .login-header p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    .auth-stack { display: flex; flex-direction: column; gap: 16px; }
    .auth-row { display: flex; gap: 12px; }
    .auth-row button { flex: 1; }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      margin: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
    .divider::before { margin-right: 12px; }
    .divider::after { margin-left: 12px; }

    .status { min-height: 20px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .status.error { color: var(--danger); }

    /* --- Main App Layout --- */
    .app-shell {
      display: none;
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 24px;
      flex-direction: column;
      gap: 32px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .title-row h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .header-actions { display: flex; align-items: center; gap: 14px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      background: rgba(128, 128, 128, 0.08);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Theme Toggle */
    .theme-toggle {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-toggle:hover { background: rgba(128, 128, 128, 0.1); color: var(--text); border-color: var(--border-focus); }
    .theme-toggle svg { width: 18px; height: 18px; position: absolute; transition: transform 0.3s, opacity 0.3s; }
    .theme-toggle .sun { opacity: 0; transform: rotate(-90deg); }
    body.light-mode .theme-toggle .sun { opacity: 1; transform: rotate(0); }
    body.light-mode .theme-toggle .moon { opacity: 0; transform: rotate(90deg); }

    /* --- Cards & Sections --- */
    .card {
      border-radius: var(--radius-md);
      padding: 28px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .card-title { font-size: 18px; font-weight: 600; color: var(--text); }

    .folder-row { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; align-items: center; }
    .folder-pills { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; }

    .folder-pill {
      background: transparent;
      color: var(--text-muted);
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-weight: 500;
      transition: all 0.2s;
    }
    .folder-pill:hover { color: var(--text); background: rgba(128, 128, 128, 0.05); }
    .folder-pill.active {
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
      border-color: transparent;
    }

    .folder-tools { display: flex; gap: 8px; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
    
    .form-footer { display: flex; justify-content: flex-end; gap: 14px; margin-top: 24px; }

    .search-wrap { position: relative; width: 320px; max-width: 100%; }
    .search-wrap input { padding-left: 40px; border-radius: var(--radius-full); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted); }

    /* --- Table --- */
    .table-container {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin-top: 20px;
      background: rgba(128, 128, 128, 0.02);
    }

    table { width: 100%; border-collapse: collapse; text-align: left; }

    th {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }

    td {
      padding: 16px 20px; font-size: 14px;
      border-bottom: 1px solid rgba(128, 128, 128, 0.08); vertical-align: middle;
    }
    
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(128, 128, 128, 0.05); }
    tbody tr:last-child td { border-bottom: none; }

    .tag {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-full);
      background: rgba(128, 128, 128, 0.08); color: var(--text-muted); font-size: 12px; border: 1px solid var(--border);
    }

    .table-actions { display: flex; gap: 8px; }
    .btn-action {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      background: transparent; border: 1px solid transparent; color: var(--text-muted);
      transition: all 0.2s;
    }
    .btn-action svg { width: 16px; height: 16px; pointer-events: none; }
    .btn-action:hover:not(:disabled) { background: rgba(128, 128, 128, 0.1); border-color: var(--border); color: var(--text); }
    .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

    .footer {
      text-align: center; padding: 32px 0 16px 0; color: var(--text-muted);
      font-size: 13px; margin-top: auto;
    }

    @media (max-width: 768px) {
      .card-header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .search-wrap { width: 100%; }
      .folder-row { flex-direction: column; align-items: stretch; }
      .folder-tools { justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <section class="login-shell" id="loginShell">
    <button class="theme-toggle login-theme-toggle" title="Toggle Theme">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    </button>
    <div class="login-card glass-panel">
      <div class="login-header">
        <h2>RustDesk Address Book</h2>
        <p>Sign in to access your synchronized endpoints.</p>
      </div>
      
      <div class="auth-stack">
        <button class="btn-secondary" type="button" id="googleLoginBtn" style="width: 100%;">
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        
        <div class="divider">OR</div>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <input type="text" id="authEmail" placeholder="Email address">
          <input type="password" id="authPassword" placeholder="Password">
        </div>
        
        <div class="auth-row">
          <button class="btn-secondary" type="button" id="emailSignupBtn">Create Account</button>
          <button class="btn-main" type="button" id="emailLoginBtn">Sign In</button>
        </div>
        
        <div class="status" id="loginStatus"></div>
      </div>
    </div>
  </section>

  <main class="app-shell" id="appShell">
    <div class="app-header">
      <div class="title-row">
        <h1>RustDesk Address Book</h1>
      </div>
      <div class="header-actions">
        <div class="pill"><span id="userEmail">Not signed in</span> <span style="margin:0 8px; opacity:0.3;">|</span> <span id="syncStatus" style="color:var(--text);">Waiting</span></div>
        
        <button class="theme-toggle" id="themeToggleBtn" title="Toggle Theme">
          <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        <button class="btn-secondary" type="button" id="logoutBtn">Log out</button>
      </div>
    </div>

    <section class="card glass-panel">
      <div class="folder-row">
        <div class="folder-pills" id="folderPills"></div>
        <div class="folder-tools">
          <button class="btn-icon-only" type="button" id="moveLeftBtn" title="Move Left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <button class="btn-icon-only" type="button" id="moveRightBtn" title="Move Right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
          <div style="width: 1px; background: var(--border); margin: 0 6px;"></div>
          <button class="btn-secondary" type="button" id="addFolderBtn">New Folder</button>
          <button class="btn-secondary" type="button" id="renameFolderBtn">Rename</button>
          <button class="btn-secondary" type="button" id="deleteFolderBtn" style="color: var(--danger); border-color: rgba(239,68,68,0.3);">Delete</button>
        </div>
      </div>
    </section>

    <section class="card glass-panel">
      <div class="card-header">
        <div class="card-title">Client Details</div>
        <div class="tag" id="modeTag">New entry</div>
      </div>
      <form id="clientForm">
        <div class="form-grid">
          <div class="field">
            <label for="clientName">Client name</label>
            <input type="text" id="clientName" placeholder="Office-PC-Solapur">
          </div>
          <div class="field">
            <label for="clientId">RustDesk ID</label>
            <input
